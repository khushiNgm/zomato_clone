name: Zomato app deployment CI-CD

on:
  push:
    branches:
      - master 
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest   

    steps:
      # Clone the code
      - name: Checkout the code
        uses: actions/checkout@v4

      # # Login to Docker Hub
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USER }}
      #     password: ${{ secrets.PASSWORD_DOCKER }}

      # Build the Docker image
      - name: Build the Docker image
        run: docker build -t ${{ secrets.DOCKER_USER }}/zomatoimage .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USER }}/zomatoimage:latest
          format: 'json'
          output: 'trivy-report.json'
          exit-code: '0' # Fails the build if vulnerabilities are found
          severity: 'CRITICAL,HIGH'
      - name: Upload trivy report 
        uses: action/upload-artifact@v3
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 
          
