name: Zomato app deployment CI-CD

on:
  push:
    branches:
      - master 

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest   

    steps:
      # Clone the code
      - name: Checkout the code
        uses: actions/checkout@v4

      # Build the Docker image
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
         SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
         args: >
          -Dsonar.projectKey=zomato_clone
          -Dsonar.projectName=zomato_clone
          -Dsonar.sources=.

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USER }}/zomatoimage:latest
          severity: 'CRITICAL,HIGH'

      - name: Scan Application Packages
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'




